<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>滑掉就回傳 (核心測試)</title>
</head>
<body style="background:#222; color:#fff; font-family:sans-serif; text-align:center; padding-top:20vh;">
  
  <h1 style="color:#f1c40f;">🔄 自動回傳測試</h1>
  <p style="font-size:1.2rem; color:#ccc;">現在請直接「滑掉這個網頁」或「切換APP」！</p>
  <p style="font-size:1rem; color:#888;">系統一偵測到你離開，就會瞬間背景上傳資料到 Firebase。</p>
  
  <h2 id="status" style="margin-top:50px; color:#3498db;">等待滑掉中... 👀</h2>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // Firebase 初始化
    const firebaseConfig = {
      apiKey: "AIzaSyDig0LXShXvoUC-Q_jsB4fnt04ndT4AKMI",
      authDomain: "fucking-semantic.firebaseapp.com",
      projectId: "fucking-semantic",
      storageBucket: "fucking-semantic.firebasestorage.app",
      messagingSenderId: "121956643814",
      appId: "1:121956643814:web:8d3691d705b62321935c27"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 產生一個帶有 EXIT_TEST 的隨機 ID，方便你後台認出來
    const sub_id = "EXIT_TEST_" + Math.floor(Math.random() * 100000);

    // 💡 核心邏輯：偵測到頁面被隱藏 (滑掉、切換APP) 時，立刻執行上傳
    const emergencyUpload = () => {
      // visibilityState === 'hidden' 代表畫面不在使用者的視線內了
      if (document.visibilityState === 'hidden') {
        
        // 瞬間寫入 Firebase
        setDoc(doc(db, "results", sub_id), {
          subjectId: sub_id,
          message: "⚠️ 受試者滑掉網頁了！成功觸發背景自動回傳！",
          timestamp: new Date().toLocaleString("zh-TW"),
          saveType: "Emergency_AutoSave"
        }).then(() => {
          console.log("背景上傳成功");
        }).catch((e) => {
          console.error("背景上傳失敗", e);
        });

      }
    };

    // 💡 綁定兩種最可靠的離開事件
    // 1. visibilitychange: 針對手機切換 APP、暗屏、滑回桌面
    document.addEventListener("visibilitychange", emergencyUpload);
    // 2. pagehide: 針對直接關閉瀏覽器分頁
    window.addEventListener("pagehide", emergencyUpload);

  </script>
</body>
</html>
