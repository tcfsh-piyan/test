<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
</head>
<body>
  <button id="btn">測試寫入 Firebase</button>
  <p id="msg"></p>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // 替換為你最新提供的設定檔
    const firebaseConfig = {
      apiKey: "AIzaSyDig0LXShXvoUC-Q_jsB4fnt04ndT4AKMI",
      authDomain: "fucking-semantic.firebaseapp.com",
      projectId: "fucking-semantic",
      storageBucket: "fucking-semantic.firebasestorage.app",
      messagingSenderId: "121956643814",
      appId: "1:121956643814:web:8d3691d705b62321935c27",
      measurementId: "G-CNM3HH940R"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.getElementById('btn').onclick = async () => {
      document.getElementById('msg').innerText = "寫入中...";
      try {
        await setDoc(doc(db, "results", "TEST_123"), { status: "成功連線" });
        document.getElementById('msg').innerText = "✅ 寫入成功！";
      } catch (e) {
        document.getElementById('msg').innerText = "❌ 失敗: " + e.message;
      }
    };
  </script>
</body>
</html>
